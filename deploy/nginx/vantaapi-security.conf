# VantaAPI hardened Nginx reverse proxy template.
# Replace vantaapi.com, certificate paths, and upstream if needed.
# Keep Next.js bound to 127.0.0.1; never expose port 3000 publicly.

limit_req_zone $binary_remote_addr zone=vantaapi_page:20m rate=8r/s;
limit_req_zone $binary_remote_addr zone=vantaapi_api:20m rate=4r/s;
limit_req_zone $binary_remote_addr zone=vantaapi_auth:10m rate=10r/m;
limit_req_zone $binary_remote_addr zone=vantaapi_admin:10m rate=2r/s;
limit_req_zone $binary_remote_addr zone=vantaapi_ai:10m rate=12r/m;
limit_conn_zone $binary_remote_addr zone=vantaapi_conn:20m;

map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}

server {
    listen 80;
    server_name vantaapi.com www.vantaapi.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name vantaapi.com www.vantaapi.com;

    # ssl_certificate     /path/to/fullchain.pem;
    # ssl_certificate_key /path/to/privkey.pem;

    server_tokens off;
    client_max_body_size 128k;
    client_body_timeout 10s;
    client_header_timeout 10s;
    keepalive_timeout 20s;
    send_timeout 15s;
    large_client_header_buffers 2 8k;
    limit_conn vantaapi_conn 40;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-Permitted-Cross-Domain-Policies "none" always;
    add_header X-Download-Options "noopen" always;

    location ~* ^/(?:\.git|\.svn|\.hg|\.env|node_modules|vendor|phpmyadmin|adminer|wp-login\.php|xmlrpc\.php|cgi-bin|server-status|actuator)(?:/|$) {
        access_log off;
        return 404;
    }

    location ~* \.(?:php|asp|aspx|jsp|cgi|bak|old|sql|sqlite|db|ini|log|yml|yaml|toml|lock)$ {
        access_log off;
        return 404;
    }

    location ^~ /api/auth/ {
        limit_req zone=vantaapi_auth burst=8 nodelay;
        proxy_pass http://127.0.0.1:3000;
        include /etc/nginx/snippets/vantaapi-proxy-headers.conf;
    }

    location ^~ /api/admin/ {
        limit_req zone=vantaapi_admin burst=8 nodelay;
        proxy_pass http://127.0.0.1:3000;
        include /etc/nginx/snippets/vantaapi-proxy-headers.conf;
    }

    location = /api/ai/coach {
        limit_req zone=vantaapi_ai burst=6 nodelay;
        proxy_read_timeout 30s;
        proxy_send_timeout 15s;
        proxy_pass http://127.0.0.1:3000;
        include /etc/nginx/snippets/vantaapi-proxy-headers.conf;
    }

    location ^~ /api/ {
        limit_req zone=vantaapi_api burst=30 nodelay;
        proxy_pass http://127.0.0.1:3000;
        include /etc/nginx/snippets/vantaapi-proxy-headers.conf;
    }

    location /_next/static/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        proxy_pass http://127.0.0.1:3000;
        include /etc/nginx/snippets/vantaapi-proxy-headers.conf;
    }

    location / {
        limit_req zone=vantaapi_page burst=60 nodelay;
        proxy_pass http://127.0.0.1:3000;
        include /etc/nginx/snippets/vantaapi-proxy-headers.conf;
    }
}
