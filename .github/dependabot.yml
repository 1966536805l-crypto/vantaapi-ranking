version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Asia/Shanghai
    open-pull-requests-limit: 5
    versioning-strategy: increase-if-necessary
    labels:
      - dependencies
      - security
    groups:
      next-react:
        patterns:
          - next
          - react
          - react-dom
          - eslint-config-next
      prisma:
        patterns:
          - prisma
          - "@prisma/*"
      types:
        patterns:
          - "@types/*"
    ignore:
      - dependency-name: webpack-obfuscator
        update-types:
          - version-update:semver-major

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:30"
      timezone: Asia/Shanghai
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - github-actions
