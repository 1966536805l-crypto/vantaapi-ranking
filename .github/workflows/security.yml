name: Security baseline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  security-baseline:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      NODE_ENV: test
      NEXT_TELEMETRY_DISABLED: "1"
      DATABASE_URL: "postgresql://ci_user:ci_password@127.0.0.1:5432/vantaapi_ci"
      JWT_SECRET: "ci-only-jwt-secret-at-least-32-characters"
      CSRF_SECRET: "ci-only-csrf-secret-at-least-32-characters"
      ENCRYPTION_KEY: "ci-only-encryption-key-at-least-32-chars"
      APP_ALLOWED_HOSTS: "vantaapi.com,www.vantaapi.com"
      ENABLE_PUBLIC_REGISTRATION: "false"
      ADMIN_2FA_REQUIRED: "true"
      ENABLE_CPP_RUNNER: "false"
      ENABLE_REDIS_RATE_LIMITS: "true"
      REDIS_RATE_LIMIT_FAIL_CLOSED: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Security regression checks
        run: npm run security:regression

      - name: Security baseline checks
        run: npm run security:check

      - name: Repository security checks
        run: npm run security:repo

      - name: Content strategy checks
        run: npm run content:check

      - name: Network security checks
        run: npm run security:network

      - name: Supply-chain checks
        run: npm run security:supply-chain

      - name: Secret pattern checks
        run: npm run security:secrets

      - name: TypeScript
        run: npm run typecheck

      - name: ESLint
        run: npm run lint

      - name: Production build
        run: npm run build

      - name: Multilingual route smoke checks
        run: |
          npm run start -- --port 3003 > /tmp/jinming-lab-next.log 2>&1 &
          SERVER_PID=$!
          trap 'kill "$SERVER_PID" 2>/dev/null || true' EXIT
          node - <<'NODE'
          const deadline = Date.now() + 30000;
          async function waitForServer() {
            while (Date.now() < deadline) {
              try {
                const response = await fetch("http://127.0.0.1:3003/?lang=ja", {
                  headers: { "User-Agent": "GitHub Actions language smoke" },
                });
                if (response.ok) return;
              } catch {
                // Server is still starting.
              }
              await new Promise((resolve) => setTimeout(resolve, 500));
            }
            throw new Error("Next server did not become ready in time");
          }
          waitForServer().catch((error) => {
            console.error(error.message);
            process.exit(1);
          });
          NODE
          npm run language:smoke -- --base=http://127.0.0.1:3003 || {
            cat /tmp/jinming-lab-next.log
            exit 1
          }
