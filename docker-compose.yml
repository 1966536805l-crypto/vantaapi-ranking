services:
  mariadb:
    image: mariadb:11.4
    container_name: immortal-mvp-mariadb
    environment:
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD:?set-a-strong-root-password}
      MARIADB_DATABASE: ${MARIADB_DATABASE:-immortal_mvp}
      MARIADB_USER: ${MARIADB_USER:-vantaapi}
      MARIADB_PASSWORD: ${MARIADB_PASSWORD:?set-a-strong-app-password}
    ports:
      # Bind database to localhost only. Never expose MySQL/MariaDB directly to LAN/Internet.
      - "127.0.0.1:3306:3306"
    volumes:
      - immortal_mvp_mariadb:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mariadb-admin ping -h 127.0.0.1 -uroot -p\"$${MARIADB_ROOT_PASSWORD}\" --silent"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  immortal_mvp_mariadb:
