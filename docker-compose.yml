services:
  postgres:
    image: postgres:17
    container_name: vantaapi-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-vantaapi}
      POSTGRES_USER: ${POSTGRES_USER:-vantaapi}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set-a-strong-app-password}
    ports:
      # Bind database to localhost only. Never expose Postgres directly to LAN/Internet.
      - "127.0.0.1:5432:5432"
    volumes:
      - vantaapi_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  vantaapi_postgres:
